severity = "Warning"
exclude = [
    "node_modules/**",
    ".git/**",
]
target = "ClaudeCode"
tools = []
locale = "en"

[rules]
skills = true
hooks = true
agents = true
memory = true
plugins = true
xml = true
mcp = true
imports = true
cross_platform = false # Intentional - state dir uses AI_STATE_DIR env var with .claude fallback
agents_md = true
prompt_engineering = true
generic_instructions = true
frontmatter_validation = true
xml_balance = true
import_references = true
disabled_rules = [
    "CDX-AG-002",  # False positive - "tokens" in "Save tokens over decorations" is not a secret
    "PE-001",      # Auto-generated AGENTS.md/CLAUDE.md - rule placement is controlled by agent-core template
    "PE-005",      # "Be concise" is ecosystem-wide boilerplate from agent-core sync
    "CC-MEM-005",  # Same as PE-005 for Claude-specific rules
    "CC-MEM-006",  # Negative instructions (NEVER/Do not) are ecosystem standard critical rules
    "CC-MEM-008",  # Duplicate of PE-001 for Claude memory files
    "AGM-004",     # AGENTS.md is auto-generated by agent-core sync with standard structure
    "XP-006",      # AGENTS.md + CLAUDE.md coexistence is by-design in the agentsys ecosystem
    "CC-SK-017",   # Intentional - version and argument-hint are client-specific frontmatter fields
]

[tool_versions]

[spec_revisions]
